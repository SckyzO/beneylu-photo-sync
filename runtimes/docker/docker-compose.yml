# runtimes/docker/docker-compose.yml
services:
  sync:
    build:
      context: ../..
      dockerfile: runtimes/docker/Dockerfile
    environment:
      ENT_LOGIN: ${ENT_LOGIN}
      ENT_PASSWORD: ${ENT_PASSWORD}
    volumes:
      - ./data:/data
    restart: "no"

  web:
    build:
      context: ../..
      dockerfile: runtimes/docker/Dockerfile.web
    environment:
      ENT_WEB_PASSWORD: ${ENT_WEB_PASSWORD:-}
      ENT_SYNC_INTERVAL_HOURS: ${ENT_SYNC_INTERVAL_HOURS:-0}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
