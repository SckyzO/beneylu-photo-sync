{% extends "base.html" %}
{% block content %}
<div class="mx-auto mt-10 max-w-md rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-white/[0.03]">
  <a href="/" class="mb-4 inline-flex items-center gap-1.5 text-sm font-medium text-gray-500 transition hover:text-brand-500">
    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="m15 18-6-6 6-6"/>
    </svg>
    Retour à la galerie
  </a>
  <h2 class="mb-5 text-xl font-semibold text-gray-800 dark:text-white/90">Configuration</h2>
  <form method="post" action="/config" class="flex flex-col gap-4">
    <label class="flex flex-col gap-1 text-sm">Identifiant ENT
      <input type="text" name="login" value="{{ login }}" autocomplete="username"
        class="rounded-xl border border-gray-300 bg-transparent px-3 py-2.5 text-sm focus:border-brand-300 focus:outline-none focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700">
    </label>
    <label class="flex flex-col gap-1 text-sm">Mot de passe ENT {% if has_password %}<em class="text-gray-400">(déjà enregistré — laisser vide pour ne pas changer)</em>{% endif %}
      <input type="password" name="password" autocomplete="new-password" placeholder="••••••••"
        class="rounded-xl border border-gray-300 bg-transparent px-3 py-2.5 text-sm focus:border-brand-300 focus:outline-none focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700">
    </label>
    <label class="flex flex-col gap-1 text-sm">Tableaux à exclure (séparés par des virgules)
      <input type="text" name="excluded_boards" value="{{ excluded_boards }}" placeholder="APEIT, Vie de l'école"
        class="rounded-xl border border-gray-300 bg-transparent px-3 py-2.5 text-sm focus:border-brand-300 focus:outline-none focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700">
      <small class="text-gray-400">Non téléchargés ; déjà synchronisés, ils sont <strong>supprimés du disque</strong> à la prochaine synchronisation.</small>
    </label>
    <label class="flex flex-col gap-1 text-sm">Fréquence de synchronisation (heures, 0 = manuel)
      <input type="number" name="sync_interval_hours" min="0" value="{{ sync_interval_hours }}"
        class="rounded-xl border border-gray-300 bg-transparent px-3 py-2.5 text-sm focus:border-brand-300 focus:outline-none focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700">
      <small class="text-gray-400">La fréquence s'applique au <strong>redémarrage</strong> du service.</small>
    </label>
    <button type="submit"
      class="rounded-xl bg-brand-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-600">Enregistrer</button>
  </form>
  <p class="mt-4 text-xs text-gray-400 dark:text-gray-500">
    Resynchronisation complète et suppression : depuis le menu <strong>Synchroniser</strong> de la galerie.
  </p>
</div>
{% endblock %}
